services:
  db:
    image: postgres:16
    container_name: buchhandlung-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: buchhandlung
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    container_name: buchhandlung-backend
    restart: unless-stopped
    working_dir: /app
    environment:
      # Überschreibt die Default-URL aus app/core/config.py
      DATABASE_URL: postgresql+psycopg2://app:app@db:5432/buchhandlung
    volumes:
      - ./src1/backend:/app
    depends_on:
      - db
    command: >
      sh -c "pip install --no-cache-dir -e . && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  frontend:
    image: node:22-alpine
    container_name: buchhandlung-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      # Projektcode
      - ./src1/frontend:/app
      # Node-Module im Container halten, damit dein Windows-Ordner sauber bleibt
      - /app/node_modules
    depends_on:
      - backend
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

volumes:
  db_data:

