services:
  backend:
    build:
      context: ./src1/backend
      dockerfile: Dockerfile
    container_name: buchhandlung-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./src1/backend:/app
    environment:
      PYTHONPATH: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./src1/frontend
      dockerfile: Dockerfile
    container_name: buchhandlung-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./src1/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
