services:
  postgres:
    image: postgres:16
    container_name: buchhandlung-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: buchhandlung
      POSTGRES_USER: buchhandlung
      POSTGRES_PASSWORD: buchhandlung
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buchhandlung -d buchhandlung"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  backend:
    build:
      context: ./src1/backend
      dockerfile: Dockerfile
    container_name: buchhandlung-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./src1/backend:/app
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+psycopg://buchhandlung:buchhandlung@postgres:5432/buchhandlung
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./src1/frontend
      dockerfile: Dockerfile
    container_name: buchhandlung-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./src1/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"

volumes:
  postgres_data:
